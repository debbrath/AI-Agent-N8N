<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Agent Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>AI Article Processor</h1>
    <form id="articleForm">
      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label for="url">Article URL:</label>
      <input type="url" id="url" placeholder="Enter article URL" required>

      <button type="submit">Process Article</button>
    </form>

    <div id="status"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
